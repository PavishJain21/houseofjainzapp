[build]
  functions = "netlify/functions"
  # NODE_ENV values (development/production) in code are not secrets
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "NODE_ENV"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# SPA - must come after /api/* so API routes are not caught
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CORS headers at edge
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Cron-Secret"
    Access-Control-Max-Age = "86400"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
